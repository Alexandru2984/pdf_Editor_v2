{% extends 'pdfeditor/base.html' %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %}{% endblock %}

{% block content %}
<div class="auth-card auth-card--center" style="--auth-card-max-width: 520px;">
    <div class="auth-icon">✅</div>
    <h2>{% trans "Password Changed" %}</h2>
    <p class="auth-sub">{% trans "Your password was updated successfully." %}</p>
    <a href="{% url 'dashboard' %}" class="btn btn-primary">{% trans "Back to Dashboard" %}</a>
</div>
{% endblock %}
