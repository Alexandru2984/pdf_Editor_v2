{% extends 'pdfeditor/base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; margin: 4rem auto; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
    <h2>Password Updated</h2>
    <p style="color: #6b7280; margin: 1rem 0 2rem;">You can now sign in with your new password.</p>
    <a href="{% url 'login' %}" class="btn btn-primary" style="text-decoration: none;">Sign In</a>
</div>
{% endblock %}
