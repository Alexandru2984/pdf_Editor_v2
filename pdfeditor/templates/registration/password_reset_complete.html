{% extends 'pdfeditor/base.html' %}
{% load i18n %}

{% block title %}{% trans "Password Reset Complete" %}{% endblock %}

{% block content %}
<div class="auth-card auth-card--center" style="--auth-card-max-width: 520px;">
    <div class="auth-icon">✅</div>
    <h2>{% trans "Password Updated" %}</h2>
    <p class="auth-sub">{% trans "You can now sign in with your new password." %}</p>
    <a href="{% url 'login' %}" class="btn btn-primary">{% trans "Sign In" %}</a>
</div>
{% endblock %}
