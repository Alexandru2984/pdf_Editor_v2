[mypy]
# Match the runtime we actually ship + run mypy on (Docker python:3.12-slim,
# CI's mypy job on 3.12). Pinning a lower target made mypy reject PEP 695
# `type` statements that modern dependency stubs (e.g. numpy) ship, aborting
# the whole run with a [syntax] error. ruff's target-version=py310 still guards
# 3.10 source-syntax compatibility for the runtime test matrix.
python_version = 3.12
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = True
exclude = (?x)(
    ^pdfeditor/tests\.py$
    | ^pdfeditor/tests_.*\.py$
    | ^pdfeditor/migrations/
    )

# We deliberately don't enable strict mode globally — the views layer
# uses untyped Django request handlers, and adding noise there is not worth
# the maintenance cost. The PDF-processing package is the load-bearing
# logic, so it gets stricter checks below.

[mypy-pdfeditor.pdf_processor.*]
disallow_untyped_defs = True
warn_return_any = True

# ssrf_guard subclasses pyHanko's private requests-fetcher hooks (_get/_post)
# to interpose an SSRF check. Matching their exact internal signatures buys
# only coupling, so relax the strict pdf_processor.* rules for this module.
[mypy-pdfeditor.pdf_processor.ssrf_guard]
disallow_untyped_defs = False
warn_return_any = False

[mypy-pdfeditor.ai_service]
disallow_untyped_defs = True
warn_return_any = True

# Skip migrations and tests — these are auto-generated or use lots of
# ad-hoc fixtures where types add no value.
# Third-party libraries without stubs.
[mypy-fitz]
ignore_missing_imports = True

[mypy-pytesseract]
ignore_missing_imports = True

[mypy-axes.*]
ignore_missing_imports = True

[mypy-django_ratelimit.*]
ignore_missing_imports = True
