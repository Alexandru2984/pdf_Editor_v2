# Promtail tails Docker container logs from the host's docker daemon and
# ships them to Loki. The docker_sd_configs target keeps the scrape list
# up to date as containers come and go (web scaling, restarts, etc.).

server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip the leading "/" off the docker container name.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      # `service` matches the compose service name (web, worker, nginx,
      # …) so dashboards/queries can pin to "all replicas of web" without
      # caring about the per-container suffix docker compose appends.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
