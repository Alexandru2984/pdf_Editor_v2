apiVersion: 1

# All alerts go through the default-email contact point. Critical alerts
# repeat more often than warnings so they don't get lost in the inbox.
policies:
  - orgId: 1
    receiver: default-email
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: default-email
        object_matchers:
          - ["severity", "=", "critical"]
        group_wait: 10s
        repeat_interval: 1h
