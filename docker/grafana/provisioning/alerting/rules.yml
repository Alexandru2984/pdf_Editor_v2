apiVersion: 1

# Each rule is evaluated against the Prometheus datasource (uid: prometheus)
# every minute. The trailing `__expr__` query applies a threshold to the
# Prometheus result so the alert only fires when the condition holds for
# the `for:` duration — quick spikes don't page.
groups:
  - orgId: 1
    name: pdfeditor
    folder: PDF Editor
    interval: 1m
    rules:
      # ---- 5xx error spike ------------------------------------------------
      - uid: pdfeditor_5xx_spike
        title: Web is serving 5xx errors
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'sum(rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[5m]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [1] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: "5xx rate {{ humanize $values.A.Value }} req/s — sustained 5 min"
          description: "Web replicas are returning HTTP 5xx faster than 1/s. Check the Grafana dashboard + Sentry."

      # ---- Latency degradation -------------------------------------------
      - uid: pdfeditor_high_latency
        title: Request latency p95 above 5s
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.95, sum by (le) (rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [5] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 10m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: "p95 latency {{ humanizeDuration $values.A.Value }} — sustained 10 min"
          description: "Either gunicorn is CPU-saturated or one endpoint is slow. Open the dashboard → per-replica panel."

      # ---- Job queue backed up -------------------------------------------
      - uid: pdfeditor_queue_depth
        title: Async job queue is backed up
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'sum(pdfeditor_job_queue_depth)'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [50] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 10m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: "{{ $values.A.Value }} jobs queued/running for 10+ min"
          description: "Workers can't keep up — scale CELERY_CONCURRENCY or add a worker replica."

      # ---- SLO burn-rate alerts ------------------------------------------
      # Two windows per SLO (1h critical, 6h warning) following the Google
      # SRE Workbook multi-burn-rate pattern. Thresholds derive from the
      # SLO target — see docs/SLOs.md for the math.
      #
      # SLO 1: API availability — target 99.9%, error budget 0.1%
      #   critical threshold = 14.4 * 0.001 = 0.0144 (1.44% 5xx rate)
      #   warning  threshold =  6.0 * 0.001 = 0.006  (0.6%  5xx rate)
      - uid: slo_api_availability_fast_burn
        title: SLO availability — fast burn (2% budget / 1h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[1h]))
                /
                sum(rate(django_http_responses_total_by_status_view_method_total[1h]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.0144] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
          slo: api_availability
        annotations:
          summary: "Availability SLO burning fast: {{ humanizePercentage $values.A.Value }} 5xx over 1h"
          description: "At this rate the 30-day error budget (43m) is gone in <2 days. See docs/RUNBOOK.md → 5xx-burst."

      - uid: slo_api_availability_slow_burn
        title: SLO availability — slow burn (5% budget / 6h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 21600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[6h]))
                /
                sum(rate(django_http_responses_total_by_status_view_method_total[6h]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.006] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 30m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
          slo: api_availability
        annotations:
          summary: "Availability SLO drifting: {{ humanizePercentage $values.A.Value }} 5xx over 6h"
          description: "Not paging-urgent yet, but the monthly budget will be exhausted in ≈ 10 days at this pace."

      # SLO 2: API latency — target 95% under 1.0s, error budget 5%
      #   critical = 14.4 * 0.05 = 0.72 (72% of requests over 1s)
      #   warning  =  6.0 * 0.05 = 0.30 (30% of requests over 1s)
      - uid: slo_api_latency_fast_burn
        title: SLO latency — fast burn (2% budget / 1h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                1 - (
                  sum(rate(django_http_requests_latency_seconds_by_view_method_bucket{le="1.0"}[1h]))
                  /
                  sum(rate(django_http_requests_latency_seconds_by_view_method_count[1h]))
                )
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.72] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
          slo: api_latency
        annotations:
          summary: "Latency SLO burning fast: {{ humanizePercentage $values.A.Value }} of requests > 1s over 1h"
          description: "Likely gunicorn CPU-bound or a slow DB query. See docs/RUNBOOK.md → high-latency."

      - uid: slo_api_latency_slow_burn
        title: SLO latency — slow burn (5% budget / 6h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 21600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                1 - (
                  sum(rate(django_http_requests_latency_seconds_by_view_method_bucket{le="1.0"}[6h]))
                  /
                  sum(rate(django_http_requests_latency_seconds_by_view_method_count[6h]))
                )
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.30] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 30m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
          slo: api_latency
        annotations:
          summary: "Latency SLO drifting: {{ humanizePercentage $values.A.Value }} of requests > 1s over 6h"
          description: "Background latency creep — open the dashboard and check per-endpoint p95."

      # SLO 3: Job success rate — target 99%, error budget 1%
      #   critical = 14.4 * 0.01 = 0.144 (14.4% of jobs failing)
      #   warning  =  6.0 * 0.01 = 0.06  (6%   of jobs failing)
      - uid: slo_job_success_fast_burn
        title: SLO jobs — fast burn (2% budget / 1h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(pdfeditor_job_total{status="failed"}[1h]))
                /
                sum(rate(pdfeditor_job_total[1h]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.144] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
          slo: job_success
        annotations:
          summary: "Job-success SLO burning fast: {{ humanizePercentage $values.A.Value }} of jobs failing over 1h"
          description: "Likely a regression in tasks.py or an upstream (OCR/Groq) down. See docs/RUNBOOK.md → workers-stuck."

      - uid: slo_job_success_slow_burn
        title: SLO jobs — slow burn (5% budget / 6h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 21600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(pdfeditor_job_total{status="failed"}[6h]))
                /
                sum(rate(pdfeditor_job_total[6h]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.06] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 30m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
          slo: job_success
        annotations:
          summary: "Job-success SLO drifting: {{ humanizePercentage $values.A.Value }} of jobs failing over 6h"
          description: "Look for a specific kind failing — `sum by (kind) (rate(pdfeditor_job_total{status=\"failed\"}[1h]))`."

      # SLO 4: Op success rate — target 99.5%, error budget 0.5%
      #   critical = 14.4 * 0.005 = 0.072 (7.2% of ops failing)
      #   warning  =  6.0 * 0.005 = 0.03  (3%   of ops failing)
      - uid: slo_op_success_fast_burn
        title: SLO ops — fast burn (2% budget / 1h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(pdfeditor_op_total{outcome="failure"}[1h]))
                /
                sum(rate(pdfeditor_op_total[1h]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.072] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
          slo: op_success
        annotations:
          summary: "Op-success SLO burning fast: {{ humanizePercentage $values.A.Value }} op failures over 1h"
          description: "PDFs are coming back broken. Likely a regression in pdf_processor — bisect the offending kind."

      - uid: slo_op_success_slow_burn
        title: SLO ops — slow burn (5% budget / 6h)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 21600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(pdfeditor_op_total{outcome="failure"}[6h]))
                /
                sum(rate(pdfeditor_op_total[6h]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.03] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 30m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
          slo: op_success
        annotations:
          summary: "Op-success SLO drifting: {{ humanizePercentage $values.A.Value }} op failures over 6h"
          description: "Low-rate breakage somewhere — check `sum by (kind) (rate(pdfeditor_op_total{outcome=\"failure\"}[6h]))`."

      # ---- Replicas down --------------------------------------------------
      - uid: pdfeditor_replicas_down
        title: Web replicas missing
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'count(up{job="pdfeditor-web"} == 1)'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: "Zero healthy web replicas"
          description: "Prometheus can't scrape any pdfeditor-web instance. Site is down or DNS broke."

      # ---- Low disk space -------------------------------------------------
      # Worst-case free ratio across the host's real filesystems (media,
      # DB volume, and Docker's own tree all live on the root fs). Retention
      # runs hourly so growth is normally bounded — this catches a stuck job,
      # a log blowup, or backups outpacing rotation before writes start
      # failing with ENOSPC. Warning, not critical: it fires with headroom.
      - uid: pdfeditor_low_disk
        title: Low disk space on host
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'min(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs|fuse.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs|fuse.*"})'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: lt, params: [0.15] }
                  operator: { type: and }
                  query: { params: ["A"] }
                  reducer: { type: last }
                  type: query
              expression: A
              refId: B
        for: 15m
        noDataState: NoData
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: "Host filesystem below 15% free ({{ humanizePercentage $values.A.Value }} left)"
          description: "A real filesystem on the VPS is running low. Check `df -h`; sweep with `docker compose exec web python manage.py cleanup_old_pdfs` and `docker system df`. Retention runs hourly — if disk is still filling, something is writing faster than it rotates."
