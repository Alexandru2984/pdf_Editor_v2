# Internal load balancer that fronts multiple `web` replicas.
#
# The host nginx (outside docker, terminating TLS) still proxies to
# 127.0.0.1:8000 — which is now this container, not a single gunicorn.
# This nginx round-robins requests across all `web` containers in the
# compose project.
#
# Docker's embedded DNS at 127.0.0.11 resolves the `web` service name
# to the A records of every running replica. We use it as a `resolver`
# so adding/removing replicas via `docker compose up --scale web=N`
# is picked up without restarting nginx.

events {
    worker_connections 1024;
}

http {
    # docker embedded DNS — refresh resolution every 5s so scale changes
    # land without an nginx reload.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Larger uploads (PDF files): match the app's PDF_MAX_UPLOAD_BYTES
    # ceiling plus a little headroom for multipart framing.
    client_max_body_size 20m;

    # Preserve the X-Forwarded-Proto sent by the host nginx (which terminated
    # TLS). Falling back to $scheme would always be "http" between containers
    # — Django's SECURE_SSL_REDIRECT then redirects to HTTPS, producing an
    # infinite loop on any request that reaches Django.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Forward sensible headers so Django sees the real client IP and the
    # original scheme (the host-level nginx already adds X-Forwarded-*;
    # we just propagate them through).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Most ops fit comfortably under a minute. Sync compress/rotate are
    # sub-second; long ops are async via Celery.
    proxy_connect_timeout 5s;
    proxy_read_timeout    75s;
    proxy_send_timeout    75s;

    # Free nginx doesn't re-resolve `upstream` block server names. Stuffing
    # the target into a variable forces per-request resolution against the
    # `resolver` above, which is how we pick up new replicas dynamically.
    map $http_host $web_upstream {
        default "web:8000";
    }

    server {
        listen 80 default_server;

        # Local healthcheck: only checks that nginx itself is up, doesn't
        # depend on the backend being reachable. Use /healthz (without
        # trailing slash) for the backend's own health endpoint — those
        # two coexist because nginx-internal must answer without touching
        # the upstream.
        location = /nginx-healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # SSE endpoint: long-lived, must not be buffered, and the read
        # timeout has to outlast the heartbeat (15s) by a wide margin so
        # an idle stream doesn't get reaped.
        location ~ ^/jobs/[0-9a-f-]+/events/?$ {
            proxy_buffering off;
            proxy_cache     off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_pass http://$web_upstream;
        }

        location / {
            proxy_pass http://$web_upstream;
            # Expose which backend served the request so it's visible in
            # response headers — useful when verifying that scaling out
            # actually distributes load.
            add_header X-Upstream $upstream_addr always;
        }
    }
}
