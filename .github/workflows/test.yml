name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          SECURE_SSL: "0"
        run: |
          coverage run --source=pdfeditor manage.py test pdfeditor
          coverage report --omit='*/migrations/*,*/tests*.py,*/templates/*'
          coverage xml --omit='*/migrations/*,*/tests*.py,*/templates/*'

      - name: Run Django deployment check
        env:
          SECRET_KEY: a-sufficiently-long-random-secret-key-for-ci-deploy-check-only
          DEBUG: "False"
          ALLOWED_HOSTS: example.com
          SECURE_SSL: "1"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
