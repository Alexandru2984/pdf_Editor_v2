name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      # Tests need Postgres + pgvector because the Embedding model uses
      # a vector(384) column with an HNSW index — SQLite can't host that.
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: pdfeditor_test
          POSTGRES_USER: pdfeditor
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pdfeditor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://pdfeditor:testpassword@localhost:5432/pdfeditor_test

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ron ghostscript

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage mypy types-requests ruff bandit pip-audit

      - name: Run ruff lint + format check
        if: matrix.python-version == '3.12'
        run: |
          ruff check pdfeditor/ pdf_project/
          ruff format --check pdfeditor/ pdf_project/

      - name: Run mypy
        if: matrix.python-version == '3.12'
        run: mypy pdfeditor/

      - name: Run bandit SAST
        if: matrix.python-version == '3.12'
        run: bandit -r pdfeditor/ pdf_project/ -c pyproject.toml -x "tests*,*/tests*"

      - name: Run pip-audit (dep CVEs)
        if: matrix.python-version == '3.12'
        run: pip-audit --requirement requirements.txt --strict

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          SECURE_SSL: "0"
        run: |
          # --exclude-tag=e2e keeps the playwright-driven suite out of
          # this matrix; it runs in the dedicated `e2e` job below where
          # browsers are installed.
          coverage run --source=pdfeditor manage.py test pdfeditor --exclude-tag=e2e
          coverage report --omit='*/migrations/*,*/tests*.py,*/templates/*'
          coverage xml --omit='*/migrations/*,*/tests*.py,*/templates/*'

      - name: Run Django deployment check
        env:
          SECRET_KEY: a-sufficiently-long-random-secret-key-for-ci-deploy-check-only
          DEBUG: "False"
          ALLOWED_HOSTS: example.com
          SECURE_SSL: "1"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  e2e:
    # Browser-driven smoke suite — proves login → upload → compress → download
    # works end-to-end with real templates, JS, and multipart upload. Runs
    # alongside the unit matrix (independent of it) and is required to be
    # green before build-and-deploy fires, because deploy.yml gates on this
    # whole workflow's conclusion.
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: pdfeditor_test
          POSTGRES_USER: pdfeditor
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pdfeditor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://pdfeditor:testpassword@localhost:5432/pdfeditor_test

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ron ghostscript

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      # The Playwright browser binaries are ~300MB and don't change between
      # most CI runs — caching them shaves ~30s off every E2E job. Cache key
      # is the playwright version so an upgrade invalidates automatically.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-v1

      - name: Install Playwright Chromium
        # --with-deps pulls in the OS libraries Chromium needs (libnss3 etc).
        # Skip the binary download on cache hit; --with-deps still runs apt
        # because system deps don't live in ~/.cache/ms-playwright.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            python -m playwright install-deps chromium
          else
            python -m playwright install --with-deps chromium
          fi

      - name: Run E2E suite
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          SECURE_SSL: "0"
        run: python manage.py test pdfeditor.tests_e2e -v 2
