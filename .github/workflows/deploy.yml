name: build-and-deploy

on:
  # Run after the tests workflow completes. workflow_run guarantees we only
  # fire once tests has actually finished, avoiding the race where both
  # workflows start in parallel on push and the deploy gets ahead.
  workflow_run:
    workflows: ["tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # 1. Build a docker image and push it to GitHub Container Registry.
  build:
    # Only deploy if tests passed. workflow_dispatch (manual trigger) has no
    # workflow_run context so the conclusion is empty — allow it through.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}
    steps:
      # workflow_run events default to the latest commit on the default branch.
      # We want the exact SHA that the tests workflow validated, so check out
      # head_sha when triggered by workflow_run.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        env:
          # Use head_sha from the workflow_run payload so the image tag
          # matches the commit that actually passed tests.
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          short_sha="sha-$(echo "$COMMIT_SHA" | cut -c1-7)"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          # Image name is forced lowercase per OCI rules.
          repo_lower="$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo_lower}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Vulnerability scan on the freshly-built image. Fails the job on
      # CRITICAL OS-package CVEs so we don't ship a known-vulnerable
      # container to prod. Pinned to the image we just pushed by short_sha.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

  # 3. SSH into the VPS and run the deploy script with the new tag.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            # Authenticate to GHCR with a personal access token that has read:packages.
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USER }} --password-stdin
            ./scripts/deploy.sh ${{ needs.build.outputs.image_tag }}
