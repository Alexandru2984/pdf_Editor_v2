version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    ignore:
      # Stay on Django 5.2 LTS until 5.x EOL in April 2028. 6.x is non-LTS
      # and requires Python 3.12+, which would shrink our CI matrix.
      # `update-types: semver-major` didn't fire for the range constraint
      # `>=5.2,<5.3` (Dependabot opened PR #18 anyway). Pin the ignore by
      # explicit version range instead — that always wins.
      - dependency-name: "Django"
        versions: [">=6"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
