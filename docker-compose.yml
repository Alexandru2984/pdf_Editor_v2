x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
  SECURE_SSL: ${SECURE_SSL:-0}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
  # Goes through pgbouncer (transaction pooling). Direct DB at db:5432 is
  # available too — pgbouncer itself talks to db, and Postgres conns are
  # already bumped to 300 for headroom.
  DATABASE_URL: postgres://${POSTGRES_USER:-pdfeditor}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-pdfeditor}
  SENTRY_DSN: ${SENTRY_DSN:-}
  # Redis is AUTH-protected (requirepass) so a SSRF in a PDF/image library
  # can't inject Celery tasks into the broker → worker RCE. Password is
  # baked into every connection URL; REDIS_PASSWORD is required in .env.
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/1}
  # Shared cache + session store. DB index 2 keeps it isolated from
  # Celery's broker/result keyspaces (which live on 0 and 1).
  REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/2}
  # SMTP — Django reads both EMAIL_* and SMTP_* aliases. Without these in
  # the container, confirmation/reset emails silently fail.
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
  SITE_URL: ${SITE_URL:-https://pdf.micutu.com}
  # Set to "0" only for load testing or local dev. Production keeps it
  # on so per-op anon quotas (5/h on auth, 20/h on ops) still apply.
  RATELIMIT_ENABLE: ${RATELIMIT_ENABLE:-1}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
  # Default covers Docker compose's bridge subnet so the bundled
  # `prometheus` service can scrape /metrics on each web replica.
  PROMETHEUS_METRICS_ALLOW: ${PROMETHEUS_METRICS_ALLOW:-127.0.0.1,172.16.0.0/12}

# Baseline container hardening, merged into every service via `<<: *hardening`.
#   no-new-privileges:true → a compromised process can never gain privileges
#     through setuid/setgid binaries (blocks a whole class of escalation).
#   cap_drop: [ALL]        → start from zero Linux capabilities; services that
#     genuinely need one add it back explicitly via `cap_add`.
# Our own image (web/worker/migrate) already runs as the non-root `app` user
# and binds a high port, so it needs no capabilities at all.
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  db:
    <<: *hardening
    # Postgres' entrypoint chowns PGDATA and drops from root to the postgres
    # user, so it needs these back: file-ownership + setuid/setgid only.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    # pgvector/pgvector:pg16 = vanilla Postgres 16 + the `vector` extension.
    # Same data dir layout as postgres:16, so the existing volume Just Works.
    image: pgvector/pgvector:pg16
    # max_connections bumped from default 100: gunicorn (3 uvicorn workers) +
    # celery (2) + pgbouncer + admin headroom blew past 100 under load.
    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - shared_buffers=512MB
    # Bound to 127.0.0.1 so local tests can hit Postgres (needed for the
    # pgvector-typed columns), without exposing the DB to the public net.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdfeditor}
      POSTGRES_USER: ${POSTGRES_USER:-pdfeditor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdfeditor} -d ${POSTGRES_DB:-pdfeditor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgbouncer:
    <<: *hardening
    # edoburu/pgbouncer's entrypoint su's from root to the postgres user.
    cap_add:
      - SETGID
      - SETUID
    # Lightweight Postgres connection pooler. Transaction mode multiplexes
    # many client sessions onto a small fixed pool of server connections —
    # under load this is the difference between healthy and "too many
    # clients already" errors at the DB.
    image: edoburu/pgbouncer:v1.23.1-p2
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-pdfeditor}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-pdfeditor}
      LISTEN_PORT: 6432
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      RESERVE_POOL_SIZE: "5"
      SERVER_RESET_QUERY: DISCARD ALL
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$DB_PASSWORD psql -h 127.0.0.1 -p 6432 -U $$DB_USER -d $$DB_NAME -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    <<: *hardening
    # redis-server starts as root then su-exec's to the redis user.
    cap_add:
      - SETGID
      - SETUID
    image: redis:7-alpine
    # --requirepass forces AUTH on every connection. Even though the port
    # isn't published to the host, this blocks the SSRF→task-injection→RCE
    # path: a forged request to redis:6379 from inside the network can't
    # issue commands without the password.
    command: >
      redis-server --appendonly yes --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redisdata:/data
    healthcheck:
      # redis-cli reads REDISCLI_AUTH from the env so the password never
      # appears in `ps`/process args.
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot init container: runs Django migrations + collectstatic once
  # before web/worker start. With N web replicas, running migrate from the
  # web CMD would have all replicas racing through advisory locks; this
  # pattern is the canonical fix and keeps the startup quiet.
  migrate:
    <<: *hardening
    build: .
    image: pdfeditor:latest
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput"
    environment:
      <<: *app-env
      FASTEMBED_CACHE_DIR: /app/data/fastembed
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - embeddings_cache:/app/data/fastembed
    restart: "no"

  web:
    <<: *hardening
    image: pdfeditor:latest
    # Immutable root filesystem: the only writable paths are the explicit
    # volumes (media, staticfiles, embeddings cache) and the tmpfs mounts
    # below. A compromised process can't drop a webshell or patch app code.
    #   /tmp                → Django upload temp, tesseract/OCR, pdf2docx scratch
    #   /home/app/.gunicorn → gunicorn 26 control socket (verified needed)
    read_only: true
    tmpfs:
      - /tmp
      - /home/app/.gunicorn
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # No host port mapping — the `nginx` service below load-balances
    # across replicas and is the only thing that listens on 8000 on
    # the host. Each replica is reachable internally as web:8000
    # (Docker's embedded DNS round-robins the A records).
    expose:
      - "8000"
    deploy:
      replicas: ${WEB_REPLICAS:-2}
    environment:
      <<: *app-env
      FASTEMBED_CACHE_DIR: /app/data/fastembed
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - embeddings_cache:/app/data/fastembed
    restart: unless-stopped

  nginx:
    <<: *hardening
    # Master binds :80 (NET_BIND_SERVICE), forks workers as the nginx user
    # (SETUID/SETGID), and chowns its cache/temp dirs (CHOWN).
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
      - CHOWN
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    <<: *hardening
    image: pdfeditor:latest
    # Same immutable rootfs as web. Celery's PDF tasks scratch to /tmp
    # (OCR/docx) and write outputs to the media volume; no other writes.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      celery -A pdf_project worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-2}
      --max-tasks-per-child=50
    environment:
      <<: *app-env
      # Persist the ONNX embedding model (~120 MB) across restarts so we
      # don't re-download it every time the worker container restarts.
      FASTEMBED_CACHE_DIR: /app/data/fastembed
    volumes:
      - ./media:/app/media
      - embeddings_cache:/app/data/fastembed
    restart: unless-stopped

  # Prometheus scrapes the web replicas' /metrics endpoints via Docker's
  # embedded DNS (one A record per replica). The port is bound to
  # 127.0.0.1 so it isn't reachable from the public network — access it
  # locally or via SSH tunnel.
  prometheus:
    <<: *hardening
    image: prom/prometheus:v2.55.1
    depends_on:
      - web
    ports:
      # 9090 on this host is already taken by a systemd-managed Prometheus
      # (pre-dating this stack). Bind to 9091 so the containerized one
      # coexists. The internal port stays 9090 so scrape configs etc.
      # don't need to change.
      - "127.0.0.1:9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    restart: unless-stopped

  grafana:
    <<: *hardening
    image: grafana/grafana:11.3.1
    depends_on:
      - prometheus
    ports:
      # 3000 is taken by pixel-art-multiplayer (node), 3001 by a Rails
      # Puma, 3002 by something else. 3003 is the first free slot in
      # the 3xxx band on this host.
      - "127.0.0.1:3003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Reuse the app's SMTP credentials so alert emails go through the
      # same relay as password-reset/confirmation mail. Grafana's host
      # field expects host:port — wire SMTP_PORT into it.
      GF_SMTP_ENABLED: "${GRAFANA_SMTP_ENABLED:-true}"
      GF_SMTP_HOST: "${SMTP_HOST:-localhost}:${SMTP_PORT:-587}"
      GF_SMTP_USER: "${SMTP_USER:-}"
      GF_SMTP_PASSWORD: "${SMTP_PASS:-}"
      GF_SMTP_FROM_ADDRESS: "${SMTP_FROM:-noreply@example.com}"
      GF_SMTP_FROM_NAME: PDF Editor Alerts
      GF_SMTP_STARTTLS_POLICY: OpportunisticStartTLS
      # Recipient for the provisioned default-email contact point —
      # referenced from docker/grafana/provisioning/alerting/contact-points.yml
      # via $__env{ALERT_EMAIL}. Set empty to silence email alerts.
      ALERT_EMAIL: "${ALERT_EMAIL:-}"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  # Log aggregation: Loki stores logs, Promtail ships them off each
  # container's stdout/stderr via the docker daemon socket. Logs are
  # then queryable from Grafana via the provisioned Loki datasource.
  loki:
    <<: *hardening
    image: grafana/loki:3.3.0
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    <<: *hardening
    # Runs as root to read the docker socket (660 root:docker) and the
    # root-owned container log files — DAC_OVERRIDE lets it bypass those
    # permission bits without any other privilege.
    cap_add:
      - DAC_OVERRIDE
    image: grafana/promtail:3.3.0
    depends_on:
      - loki
    volumes:
      - ./docker/promtail-config.yml:/etc/promtail/config.yml:ro
      # Read-only access to the docker socket + container log directory.
      # Promtail uses the socket only for service discovery (listing
      # containers + their labels); it reads log files directly.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_data:/promtail
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  embeddings_cache:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_data:
