x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
  SECURE_SSL: ${SECURE_SSL:-0}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
  DATABASE_URL: postgres://${POSTGRES_USER:-pdfeditor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pdfeditor}
  SENTRY_DSN: ${SENTRY_DSN:-}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdfeditor}
      POSTGRES_USER: ${POSTGRES_USER:-pdfeditor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdfeditor} -d ${POSTGRES_DB:-pdfeditor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    image: pdfeditor:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment: *app-env
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    restart: unless-stopped

  worker:
    image: pdfeditor:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A pdf_project worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-2}
      --max-tasks-per-child=50
    environment: *app-env
    volumes:
      - ./media:/app/media
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
