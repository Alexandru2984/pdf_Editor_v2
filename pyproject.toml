[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = [
    "venv",
    "staticfiles",
    "media",
    "*/migrations/*",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "W",   # warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "C4",  # comprehensions
]
ignore = [
    "E501",  # long lines — line-length already set; we tolerate occasional overruns
    "B008",  # function calls in default args (Django uses these legitimately)
]

[tool.ruff.lint.per-file-ignores]
# Tests can use star imports, longer lines, and bare except where convenient.
"pdfeditor/tests*.py" = ["E402", "F401", "F811"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
